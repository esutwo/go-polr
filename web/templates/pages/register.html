{{ template "base" . }}

{{ define "navbar" }}
<a href="/login">Login</a>
<a href="/register">Register</a>
{{ end }}

{{ define "content" }}
<div class="auth-container">
    <h1>Register</h1>

    {{ if .error }}
        <div class="alert alert-error">{{ .error }}</div>
    {{ end }}

    <form action="/register" method="POST" class="auth-form">
        <input type="hidden" name="_csrf" value="{{ .csrf_token }}">

        <div class="form-group">
            <label for="username">Username</label>
            <input type="text" id="username" name="username"
                   value="{{ .username }}" required class="form-control"
                   autocomplete="username" minlength="3" maxlength="50">
        </div>

        <div class="form-group">
            <label for="email">Email</label>
            <input type="email" id="email" name="email"
                   value="{{ .email }}" required class="form-control"
                   autocomplete="email">
        </div>

        <div class="form-group">
            <label for="password">Password</label>
            <input type="password" id="password" name="password"
                   required class="form-control" autocomplete="new-password"
                   minlength="6">
            <small>Minimum 6 characters</small>
        </div>

        <div class="form-group">
            <label for="password_confirm">Confirm Password</label>
            <input type="password" id="password_confirm" name="password_confirm"
                   required class="form-control" autocomplete="new-password">
        </div>

        <button type="submit" class="btn btn-primary btn-large">Register</button>
    </form>

    <p class="auth-link">Already have an account? <a href="/login">Login</a></p>
</div>
{{ end }}
